<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Engine</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  .header {
    padding: 20px;
    text-align: center;
    background: #111;
    border-bottom: 1px solid #222;
  }
  #symbol {
    font-size: 28px;
    font-weight: bold;
  }
  #price {
    font-size: 24px;
    margin-top: 5px;
  }
  #decision {
    font-size: 20px;
    margin-top: 5px;
    font-weight: bold;
  }
  .tf-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
  }
  .tf-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 15px;
    margin: 10px;
    min-width: 180px;
  }
  .tf-card h3 {
    margin: 0 0 10px 0;
    text-align: center;
  }
  .green { color: #00ff88; }
  .red { color: #ff4444; }
  .gray { color: #999; }
  .times {
    padding: 20px;
    text-align: center;
  }
  .loading {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .loading img {
    width: 60px;
  }
  .input-container {
    text-align: center;
    padding: 10px;
  }
  #symbol-input {
    padding: 6px 8px;
    font-size: 16px;
    margin-right: 10px;
    background: #111;
    color: #fff;
    border: 1px solid #222;
  }
  #load-btn {
    padding: 6px 12px;
    background: #111;
    color: #fff;
    border: 1px solid #222;
  }
  #load-btn:hover {
    cursor: pointer;
    background: #222;
  }
</style>
</head>
<body>

<div class="header">
  <div id="symbol">--</div>
  <div id="price">--</div>
  <div id="decision">--</div>
</div>

<div class="input-container">
  <input type="text" id="symbol-input" placeholder="Enter symbol e.g. BTCUSDT">
  <button id="load-btn">Load</button>
</div>

<div class="tf-container" id="tf-container"></div>

<div class="times" id="times"></div>

<div class="loading" id="loading">
  <img src="https://i.gifer.com/ZZ5H.gif" alt="Loading...">
</div>

<footer style="background:#111; color:#fff; padding:20px; font-family:Arial,sans-serif; text-align:center;">
  <h3>Important Crypto Resources</h3>
  <ul style="list-style:none; padding:0; margin:0;">
    <li><a href="https://coinmarketcap.com/" target="_blank" style="color:#1E90FF; text-decoration:none;">CoinMarketCap</a></li>
    <li><a href="https://cryptobubbles.net/" target="_blank" style="color:#1E90FF; text-decoration:none;">Crypto Bubbles</a></li>
    <li><a href="https://demo.binance.com/en/futures/BTCUSDT" target="_blank" style="color:#1E90FF; text-decoration:none;">Binance Futures Demo</a></li>
  </ul>
</footer>

<script>
let btcDecisionGlobal = "--";

async function loadTrend(symbol = "BTCUSDT") {
  showLoading(true);

  try {
    // Always fetch BTC
    const btcRes = await fetch(`/api/trend?symbol=BTCUSDT`);
    const btcData = await btcRes.json();
    btcDecisionGlobal = btcData.trade_decision || "--";

    // Fetch selected symbol
    const res = await fetch(`/api/trend?symbol=${symbol}`);
    const coinData = await res.json();

    renderHeader(coinData, coinData.trade_decision);
    renderTimeframes(coinData);
    renderTimes(coinData);

  } catch (err) {
    console.error("API Error:", err);
  }

  showLoading(false);
}

function renderHeader(data, coinDecision) {
  document.getElementById("symbol").innerText = data.symbol || "--";
  document.getElementById("price").innerText = data.price || "--";

  let decisionHTML = `
    <p>
      BTC: <span class="${colorTrend(btcDecisionGlobal)}">
        ${btcDecisionGlobal || "--"}
      </span>
    </p>
  `;

  // Only add coin decision if it exists and is not empty
  if (coinDecision && data.symbol !== "BTCUSDT") {
    decisionHTML += `
      <p>
        ${data.symbol}: 
        <span class="${colorTrend(coinDecision)}">
          ${coinDecision}
        </span>
      </p>
    `;
  }

  document.getElementById("decision").innerHTML = decisionHTML;
}

function renderTimeframes(data) {
  const container = document.getElementById("tf-container");
  container.innerHTML = "";

  if (!data.trends) return;

  const orderedTimeframes = ["1h", "15m", "5m", "1m"];

  orderedTimeframes.forEach(tf => {
    if (!data.trends[tf]) return;

    const trend = data.trends[tf] || "--";
    const ema = data.ema25_strength[tf] || "--";
    const vwap = data.vwap_strength[tf] || "--";
    const rsi = data.rsi_strength[tf] || ["--", "--"];
    const adx = data.adx_strength[tf] || ["--", "--"];
    const atr = data.atr_strength[tf] || ["--", "--"];

    const card = document.createElement("div");
    card.className = "tf-card";

    card.innerHTML = `
      <h3>${tf}</h3>
      <p>Symbol: ${data.symbol}</p>
      <p>Trend: <span class="${colorTrend(trend)}">${trend}</span></p>
      <p>EMA25: <span class="${colorTrend(ema)}">${ema}</span></p>
      <p>VWAP: <span class="${colorVWAP(vwap)}">${vwap}</span></p>
      <p>RSI: ${rsi[0]} (${rsi[1]})</p>
      <p>ADX: ${adx[0]} (${adx[1]})</p>
      <p>ATR: ${atr[0]} (${atr[1]})</p>
    `;

    container.appendChild(card);
  });
}

function renderTimes(data) {
  const container = document.getElementById("times");
  container.innerHTML = "";
  if (!data.times) return;

  const order = ["UTC", "PK", "Tokyo", "London", "NewYork"];

  order.forEach((key) => {
    if (data.times[key]) {
      const row = document.createElement("div");
      row.innerHTML = `<b>${key}:</b> ${data.times[key]}`;
      container.appendChild(row);
    }
  });
}

function colorTrend(value) {
  if (!value) return "gray";

  const greenKeywords = ["UP", "BULLISH", "Bullish", "ABOVE"];
  const redKeywords = ["DOWN", "BEARISH", "Bearish", "BELOW"];

  if (greenKeywords.some(keyword => value.includes(keyword))) return "green";
  if (redKeywords.some(keyword => value.includes(keyword))) return "red";

  return "gray";
}

function colorVWAP(value) {
  return value === "ABOVE" ? "green" : "red";
}

function showLoading(state) {
  document.getElementById("loading").style.display = state ? "block" : "none";
}

document.getElementById("load-btn").addEventListener("click", () => {
  const symbol = document.getElementById("symbol-input").value.trim().toUpperCase();
  if (symbol) loadTrend(symbol);
});

// Initial load
loadTrend();
</script>

</body>
</html>
